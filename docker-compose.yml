services:
  # DevTrack application
  devtrack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devtrack-app
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - DEVTRACK_DATA_DIR=/home/devtrack/.local/share/devtrack
      - DEVTRACK_CONFIG_DIR=/home/devtrack/.config/devtrack
      - WORKSPACE_DIR=/workspace
    volumes:
      # Persistent data storage
      - devtrack-data:/home/devtrack/.local/share/devtrack
      - devtrack-config:/home/devtrack/.config/devtrack
      # Workspace mount (read/write access to user's files)
      - type: bind
        source: ${DEVTRACK_WORKSPACE:-.}
        target: /workspace
      # Mount home directory to access all git repositories
      - type: bind
        source: ${HOME}
        target: /home/host
    networks:
      - devtrack-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    command: ["--help"]

volumes:
  # DevTrack database and state
  devtrack-data:
    driver: local
  # DevTrack configuration files
  devtrack-config:
    driver: local

networks:
  devtrack-network:
    driver: bridge
