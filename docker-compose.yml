# docker-compose.yml
# Local development infrastructure for DevTrack.
# Spins up MongoDB, Redis, and PostgreSQL — used by:
#   - Personalization / RAG (MongoDB)
#   - Managed cloud mode backend (all three)
#
# DevTrack itself runs natively (Go binary + uv Python), NOT in Docker.
# See docs/INSTALLATION.md for setup.
#
# Usage:
#   docker compose up -d      # start services
#   docker compose down       # stop services
#   docker compose down -v    # stop + wipe volumes

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  # Used by: personalization (RAG samples, user profiles), managed mode
  mongo:
    image: mongo:7
    container_name: devtrack-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-devtrack}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-devtrack}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-devtrack}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - devtrack-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────────
  # Used by: managed cloud mode (event queue, WebSocket pub/sub)
  redis:
    image: redis:7-alpine
    container_name: devtrack-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-devtrack}
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - devtrack-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-devtrack}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  # Used by: managed cloud mode (user accounts, API keys, team config)
  postgres:
    image: postgres:16-alpine
    container_name: devtrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devtrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devtrack}
      POSTGRES_DB: ${POSTGRES_DB:-devtrack}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - devtrack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devtrack} -d ${POSTGRES_DB:-devtrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  redis-data:
  postgres-data:

networks:
  devtrack-network:
    driver: bridge
