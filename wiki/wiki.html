<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevTrack Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme" />
  <style>
    /* ── Reset & Tokens ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;

      --sidebar-w: 260px;
      --topbar-h: 52px;
      --content-max: 860px;
      --radius: 6px;
      --radius-lg: 10px;

      /* Light theme */
      --bg: #ffffff;
      --bg-subtle: #f8f8f8;
      --bg-muted: #f1f1f1;
      --border: #e5e5e5;
      --border-strong: #d0d0d0;
      --text: #111111;
      --text-muted: #666666;
      --text-faint: #999999;
      --accent: #0070f3;
      --accent-bg: #eff6ff;
      --accent-hover: #0060df;
      --sidebar-bg: #fafafa;
      --sidebar-border: #ebebeb;
      --code-bg: #f6f8fa;
      --code-border: #e1e4e8;
      --nav-hover: #f0f0f0;
      --nav-active-bg: #eff6ff;
      --nav-active-text: #0070f3;
      --scrollbar: #d8d8d8;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
      --shadow-md: 0 4px 12px rgba(0,0,0,.10);
      --callout-note: #eff6ff;
      --callout-note-border: #93c5fd;
      --callout-tip: #f0fdf4;
      --callout-tip-border: #86efac;
      --callout-warn: #fffbeb;
      --callout-warn-border: #fcd34d;
    }

    [data-theme="dark"] {
      --bg: #111111;
      --bg-subtle: #1a1a1a;
      --bg-muted: #222222;
      --border: #2a2a2a;
      --border-strong: #3a3a3a;
      --text: #ededed;
      --text-muted: #a0a0a0;
      --text-faint: #666666;
      --accent: #3b82f6;
      --accent-bg: #1a2744;
      --accent-hover: #60a5fa;
      --sidebar-bg: #151515;
      --sidebar-border: #222222;
      --code-bg: #1c1c1c;
      --code-border: #2e2e2e;
      --nav-hover: #222222;
      --nav-active-bg: #1a2744;
      --nav-active-text: #60a5fa;
      --scrollbar: #333333;
      --callout-note: #1a2744;
      --callout-note-border: #2563eb;
      --callout-tip: #0f2a1a;
      --callout-tip-border: #16a34a;
      --callout-warn: #2a1e00;
      --callout-warn-border: #d97706;
    }

    [data-theme="dark"] #hljs-theme { display: none; }
    [data-theme="dark"] #hljs-theme-dark { display: block; }
    #hljs-theme-dark { display: none; }

    html { font-size: 15px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 99px; }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ───────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .2s ease, transform .2s ease;
      position: relative;
      z-index: 200;
    }
    .sidebar.collapsed { width: 0; }

    .sidebar-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--sidebar-border);
      flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .brand-icon {
      width: 30px; height: 30px; border-radius: 7px;
      background: var(--accent); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .brand-name { font-size: .95rem; font-weight: 700; letter-spacing: -.02em; }
    .brand-sub { font-size: .72rem; color: var(--text-faint); margin-top: 1px; }

    .sidebar-search {
      margin: 12px 12px 0;
      position: relative;
    }
    .sidebar-search input {
      width: 100%;
      padding: 7px 10px 7px 32px;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: .8rem;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .sidebar-search input::placeholder { color: var(--text-faint); }
    .sidebar-search input:focus { border-color: var(--accent); }
    .sidebar-search svg {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--text-faint); pointer-events: none;
    }

    .nav { flex: 1; overflow-y: auto; padding: 8px 0 16px; }

    .nav-group { margin-bottom: 2px; }
    .nav-group-label {
      padding: 8px 16px 4px;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px;
      font-size: .83rem;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      border-radius: 0;
      transition: background .1s, color .1s;
      border-left: 2px solid transparent;
      white-space: nowrap;
      overflow: hidden;
    }
    .nav-item:hover { background: var(--nav-hover); color: var(--text); }
    .nav-item.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-text);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    .nav-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: .7; }
    .nav-item.active svg { opacity: 1; }

    /* ── Topbar ────────────────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

    .topbar {
      height: var(--topbar-h);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
      background: var(--bg);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-toggle {
      padding: 6px; border-radius: var(--radius);
      border: 1px solid var(--border);
      background: none; cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s;
    }
    .topbar-toggle:hover { background: var(--bg-muted); color: var(--text); }
    .topbar-toggle svg { width: 15px; height: 15px; }

    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: .82rem; color: var(--text-muted); flex: 1; }
    .breadcrumb .sep { opacity: .4; }
    .breadcrumb .current { color: var(--text); font-weight: 500; }

    .topbar-actions { display: flex; gap: 8px; margin-left: auto; }
    .icon-btn {
      padding: 6px; border-radius: var(--radius);
      border: 1px solid var(--border);
      background: none; cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s; font-size: .8rem;
    }
    .icon-btn:hover { background: var(--bg-muted); color: var(--text); }
    .icon-btn svg { width: 15px; height: 15px; }

    .version-chip {
      font-size: .72rem; font-weight: 500; padding: 2px 8px;
      background: var(--bg-muted); border: 1px solid var(--border);
      border-radius: 99px; color: var(--text-muted);
    }

    /* ── Content Area ──────────────────────────────────────────────────── */
    .content-wrap { flex: 1; overflow-y: auto; }
    .content-inner {
      max-width: calc(var(--content-max) + 80px);
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    /* ── Loading / Error states ─────────────────────────────────────────── */
    .state-msg {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 300px; gap: 12px;
      color: var(--text-muted); font-size: .9rem; text-align: center;
    }
    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Home / Landing ─────────────────────────────────────────────────── */
    .home-hero {
      border-bottom: 1px solid var(--border);
      padding-bottom: 40px; margin-bottom: 48px;
    }
    .home-badge {
      display: inline-block; font-size: .72rem; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 99px;
      background: var(--accent-bg); color: var(--accent);
      border: 1px solid var(--accent); margin-bottom: 16px;
    }
    .home-title {
      font-size: 2.4rem; font-weight: 700; letter-spacing: -.04em;
      line-height: 1.15; color: var(--text); margin-bottom: 12px;
    }
    .home-title span { color: var(--accent); }
    .home-sub { font-size: 1.05rem; color: var(--text-muted); max-width: 560px; line-height: 1.65; }

    .home-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px; margin-bottom: 48px;
    }
    .home-card {
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 18px 20px; cursor: pointer; text-decoration: none;
      color: var(--text); background: var(--bg);
      transition: border-color .15s, box-shadow .15s, transform .1s;
      display: block;
    }
    .home-card:hover {
      border-color: var(--accent); box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .home-card-icon { font-size: 1.4rem; margin-bottom: 10px; }
    .home-card-title { font-size: .9rem; font-weight: 600; margin-bottom: 4px; }
    .home-card-desc { font-size: .8rem; color: var(--text-muted); line-height: 1.5; }

    .quick-start-box {
      background: var(--code-bg); border: 1px solid var(--code-border);
      border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 48px;
    }
    .quick-start-box h3 { font-size: .95rem; margin-bottom: 14px; color: var(--text); }

    .feature-list { display: flex; flex-direction: column; gap: 12px; }
    .feature-item { display: flex; gap: 12px; align-items: flex-start; }
    .feature-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent-bg); border: 1px solid var(--accent);
      color: var(--accent); font-size: .65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .feature-item h4 { font-size: .88rem; font-weight: 600; margin-bottom: 2px; }
    .feature-item p { font-size: .82rem; color: var(--text-muted); }
    .feature-item kbd {
      display: inline-block; font-family: var(--mono); font-size: .72rem;
      background: var(--bg-muted); border: 1px solid var(--border-strong);
      border-radius: 3px; padding: 0 4px; line-height: 1.5;
      color: var(--text); box-shadow: 0 1px 0 var(--border-strong);
    }

    /* ── Markdown Rendered Content ─────────────────────────────────────── */
    .md-body { max-width: var(--content-max); }

    .md-body h1 {
      font-size: 1.9rem; font-weight: 700; letter-spacing: -.04em;
      line-height: 1.2; margin-bottom: 12px; color: var(--text);
      border-bottom: 1px solid var(--border); padding-bottom: 12px;
    }
    .md-body h2 {
      font-size: 1.3rem; font-weight: 600; letter-spacing: -.02em;
      line-height: 1.3; margin: 36px 0 12px; color: var(--text);
      border-bottom: 1px solid var(--border); padding-bottom: 8px;
    }
    .md-body h3 {
      font-size: 1.05rem; font-weight: 600;
      margin: 28px 0 8px; color: var(--text);
    }
    .md-body h4 {
      font-size: .93rem; font-weight: 600;
      margin: 20px 0 6px; color: var(--text);
    }
    .md-body h5, .md-body h6 {
      font-size: .88rem; font-weight: 600;
      margin: 16px 0 4px; color: var(--text-muted);
    }

    .md-body p { margin-bottom: 16px; }
    .md-body p:last-child { margin-bottom: 0; }

    .md-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .1s; }
    .md-body a:hover { border-bottom-color: var(--accent); }

    .md-body ul, .md-body ol {
      padding-left: 24px; margin-bottom: 16px;
    }
    .md-body li { margin-bottom: 5px; }
    .md-body li p { margin-bottom: 4px; }

    .md-body strong { font-weight: 600; }
    .md-body em { font-style: italic; }

    .md-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px; margin: 20px 0;
      background: var(--accent-bg); border-radius: 0 var(--radius) var(--radius) 0;
    }
    .md-body blockquote p { color: var(--text-muted); margin: 0; font-size: .9rem; }

    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    /* ── Code ──────────────────────────────────────────────────────────── */
    .md-body code {
      font-family: var(--mono);
      font-size: .83em;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--text);
    }

    .md-body pre {
      position: relative;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: var(--radius-lg);
      margin: 20px 0;
      overflow: hidden;
    }
    .md-body pre code {
      display: block;
      overflow-x: auto;
      padding: 16px 20px;
      background: transparent;
      border: none;
      border-radius: 0;
      font-size: .82rem;
      line-height: 1.65;
    }

    .code-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px 0;
    }
    .code-lang {
      font-size: .7rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--text-faint);
    }
    .copy-btn {
      font-family: var(--sans); font-size: .75rem;
      padding: 3px 10px; border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg); color: var(--text-muted);
      cursor: pointer; transition: all .1s; white-space: nowrap;
    }
    .copy-btn:hover { background: var(--bg-muted); color: var(--text); }
    .copy-btn.copied { color: #16a34a; border-color: #16a34a; }

    /* ── Tables ────────────────────────────────────────────────────────── */
    .md-body .table-wrap { overflow-x: auto; margin: 20px 0; }
    .md-body table {
      width: 100%; border-collapse: collapse;
      font-size: .85rem; border-radius: var(--radius-lg);
      overflow: hidden; border: 1px solid var(--border);
    }
    .md-body th {
      background: var(--bg-subtle); text-align: left;
      padding: 9px 14px; font-weight: 600; font-size: .82rem;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
    }
    .md-body td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
    .md-body tr:last-child td { border-bottom: none; }
    .md-body tr:hover td { background: var(--bg-subtle); }

    /* ── Search Results ─────────────────────────────────────────────────── */
    .search-results {
      padding: 4px 0;
    }
    .search-result-item {
      padding: 8px 16px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .1s;
    }
    .search-result-item:hover {
      background: var(--nav-hover); border-left-color: var(--accent);
    }
    .search-result-title { font-size: .82rem; font-weight: 500; color: var(--text); }
    .search-result-section { font-size: .72rem; color: var(--text-faint); margin-top: 2px; }
    .search-no-results { padding: 12px 16px; font-size: .82rem; color: var(--text-faint); }

    /* ── TOC ────────────────────────────────────────────────────────────── */
    .toc-panel {
      position: fixed; right: 0; top: var(--topbar-h);
      width: 200px; height: calc(100vh - var(--topbar-h));
      overflow-y: auto; padding: 24px 16px;
      border-left: 1px solid var(--border);
      background: var(--bg);
      font-size: .78rem;
    }
    .toc-panel h6 {
      font-size: .68rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-faint);
      margin-bottom: 10px;
    }
    .toc-panel a {
      display: block; padding: 3px 0 3px 10px;
      color: var(--text-muted); text-decoration: none;
      border-left: 1px solid var(--border);
      transition: color .1s, border-color .1s;
      line-height: 1.5;
    }
    .toc-panel a:hover { color: var(--text); border-left-color: var(--accent); }
    .toc-panel a.active { color: var(--accent); border-left-color: var(--accent); font-weight: 500; }
    .toc-panel a.toc-h3 { padding-left: 22px; font-size: .74rem; }
    @media (max-width: 1200px) { .toc-panel { display: none; } }

    /* ── Mobile ─────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0;
        transform: translateX(-100%); width: var(--sidebar-w);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar.collapsed { transform: translateX(-100%); width: var(--sidebar-w); }
      .content-inner { padding: 24px 20px 60px; }
      .home-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme-dark" />

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <a class="brand" href="#" onclick="navigate('home');return false;">
        <div class="brand-icon">D</div>
        <div>
          <div class="brand-name">DevTrack</div>
          <div class="brand-sub">Developer Automation</div>
        </div>
      </a>
      <div class="sidebar-search" style="margin-top:12px;">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
        <input type="text" id="searchInput" placeholder="Search docs…" autocomplete="off" />
      </div>
      <div id="searchResults" class="search-results" style="display:none;"></div>
    </div>

    <nav class="nav" id="nav">
      <!-- Populated by JS -->
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <button class="topbar-toggle" id="sidebarToggle" title="Toggle sidebar">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
      </button>
      <div class="breadcrumb" id="breadcrumb">
        <span>DevTrack</span>
        <span class="sep">/</span>
        <span class="current" id="breadcrumbCurrent">Home</span>
      </div>
      <div class="topbar-actions">
        <span class="version-chip">v1.4-dev</span>
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <svg id="themeIcon" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="content-wrap" id="contentWrap">
      <div class="content-inner" id="content">
        <div class="state-msg"><div class="spinner"></div><span>Loading…</span></div>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
// ── Navigation Config ─────────────────────────────────────────────────────────
const NAV = [
  {
    group: 'Get Started',
    items: [
      { id: 'home',            label: 'Home',               icon: home_icon() },
      { id: 'GETTING_STARTED', label: 'Getting Started',    icon: rocket_icon() },
      { id: 'INSTALLATION',    label: 'Installation',       icon: download_icon() },
      { id: 'QUICK_START',     label: 'Quick Start',        icon: flash_icon() },
      { id: 'WHATS_NEW',       label: "What's New",         icon: '🎉' },
    ]
  },
  {
    group: 'Reference',
    items: [
      { id: 'CLI_REFERENCE',   label: 'CLI Reference',      icon: terminal_icon() },
      { id: 'CONFIGURATION',   label: 'Configuration',      icon: settings_icon() },
      { id: 'MULTI_REPO',      label: 'Multi-Repo Setup',   icon: git_icon() },
      { id: 'ARCHITECTURE',    label: 'Architecture',       icon: arch_icon() },
    ]
  },
  {
    group: 'Git & Shell Integration',

  SERVER_TUI: `<div class="md-body">
<h1>Server TUI</h1>
<p>The Server TUI is a terminal-based process monitor for the DevTrack Python backend. It gives you a live, keyboard-driven view of all server processes and their resource usage — no separate monitoring tool required.</p>

<h2>Launching</h2>
<pre><code class="language-bash">devtrack server-tui</code></pre>
<p>Requires <code>PROJECT_ROOT</code> to be set in your <code>.env</code> file so the TUI knows where to find the server processes. The daemon does not need to be running first — the TUI can also be used to start individual processes from cold.</p>

<h2>What It Shows</h2>
<p>The main panel is a table with one row per server process:</p>
<div class="table-wrap"><table>
<thead><tr><th>Process</th><th>Description</th></tr></thead>
<tbody>
<tr><td><code>webhook_server</code></td><td>FastAPI server on port 8089 — receives HTTPS trigger POSTs from the Go daemon and inbound webhooks from Azure, GitHub, GitLab, and Jira</td></tr>
<tr><td><code>telegram_bot</code></td><td>Telegram bot polling loop — remote control and mobile access</td></tr>
<tr><td><code>slack_bot</code></td><td>Slack Socket Mode bot — <code>/devtrack</code> slash command and proactive work reminders (only when <code>SLACK_ENABLED=true</code>)</td></tr>
<tr><td><code>alert_poller</code></td><td>Background ticket alerter — polls GitHub, Azure DevOps, and Jira for events assigned to you</td></tr>
</tbody>
</table></div>
<p>Each row shows live CPU%, memory usage, current status (<strong>running</strong> / <strong>stopped</strong> / <strong>error</strong>), and the process uptime.</p>
<p>A <strong>health bar</strong> at the top of the screen shows the aggregate status of the webhook server and Ollama — a quick glance tells you if the two most latency-sensitive services are reachable.</p>

<h2>Keyboard Shortcuts</h2>
<div class="table-wrap"><table>
<thead><tr><th>Key</th><th>Action</th></tr></thead>
<tbody>
<tr><td><code>↑</code> / <code>k</code></td><td>Move selection up</td></tr>
<tr><td><code>↓</code> / <code>j</code></td><td>Move selection down</td></tr>
<tr><td><code>r</code></td><td>Restart the selected process</td></tr>
<tr><td><code>s</code></td><td>Start the selected process (if stopped)</td></tr>
<tr><td><code>x</code></td><td>Stop the selected process</td></tr>
<tr><td><code>l</code></td><td>Toggle the log pane — streams the tail of that process's log file</td></tr>
<tr><td><code>q</code></td><td>Quit the TUI (leaves all server processes running)</td></tr>
</tbody>
</table></div>

<h2>Requirements</h2>
<ul>
<li><code>PROJECT_ROOT</code> set in <code>.env</code> — the TUI uses this to locate PID files and log directories under <code>Data/</code></li>
<li>The <code>textual</code> Python package — installed automatically via <code>uv sync</code></li>
<li>Python backend dependencies present (same virtualenv used by <code>devtrack start</code>)</li>
</ul>

<blockquote><p><strong>Note:</strong> All server state (PIDs, process metadata) is stored in <code>Data/devtrack.db</code> — the single SQLite database that now holds all DevTrack runtime state. No JSON PID files or separate state files are written.</p></blockquote>
</div>`,

  ADMIN_CONSOLE: `<div class="md-body">
<h1>Admin Console</h1>
<p>The Admin Console is a lightweight web UI for managing DevTrack's Python backend — users, API keys, LLM configuration, and integration credentials — without touching the command line or <code>.env</code> directly. It is built with HTMX + Jinja2 and has no JavaScript build step.</p>

<h2>Launching</h2>
<pre><code class="language-bash">devtrack admin-start</code></pre>
<p>Then open <a href="http://localhost:8090/admin/" target="_blank" rel="noopener">http://localhost:8090/admin/</a> in a browser.</p>
<p>The Admin Console runs on a <strong>separate port (8090)</strong> from the webhook server (8089) so it can be firewall-restricted independently in production deployments.</p>

<h2>Required .env Variables</h2>
<div class="table-wrap"><table>
<thead><tr><th>Variable</th><th>Default</th><th>Description</th></tr></thead>
<tbody>
<tr><td><code>ADMIN_PORT</code></td><td><code>8090</code></td><td>Port the admin server listens on</td></tr>
<tr><td><code>ADMIN_HOST</code></td><td><code>0.0.0.0</code></td><td>Bind address (<code>127.0.0.1</code> to restrict to localhost)</td></tr>
<tr><td><code>ADMIN_USERNAME</code></td><td><code>admin</code></td><td>Login username</td></tr>
<tr><td><code>ADMIN_PASSWORD</code></td><td><code>changeme</code></td><td>Login password — <strong>change before exposing to a network</strong></td></tr>
<tr><td><code>ADMIN_SECRET_KEY</code></td><td>—</td><td>Secret used to sign JWT session cookies — required, no default</td></tr>
<tr><td><code>ADMIN_SESSION_HOURS</code></td><td><code>8</code></td><td>Session lifetime in hours before re-login is required</td></tr>
</tbody>
</table></div>

<h2>Pages</h2>

<h3>Dashboard</h3>
<p>Live overview of all server processes (same data as the Server TUI), service health checks (webhook server reachability, Ollama availability), and summary stats — total commits logged, work sessions this week, alerts delivered.</p>

<h3>Users</h3>
<p>Create and delete DevTrack users. Each user gets an <strong>API key</strong> that clients use to authenticate against the webhook server and REST endpoints. Keys can be rotated from this page without touching <code>.env</code>.</p>

<h3>Server</h3>
<p>Read-only view of the active LLM provider configuration (which provider is primary, which are fallbacks), and the status of each external integration credential (Azure DevOps, GitHub, GitLab, Jira, Telegram, Slack, MongoDB, Redis). A green tick means the credential is present and the service responded to a ping; red means missing or unreachable.</p>

<h3>Audit Log</h3>
<p>Timestamped log of every admin action — login, user creation/deletion, key rotation — with the acting username and IP address. Useful for auditing shared team deployments.</p>

<h2>Authentication</h2>
<p>The console uses a <strong>JWT session cookie</strong>. Credentials are set via <code>ADMIN_USERNAME</code> / <code>ADMIN_PASSWORD</code> in <code>.env</code>. On first login you will be prompted to change the default password if <code>ADMIN_PASSWORD=changeme</code> is still set — the console will refuse to serve any page other than the password-change form until it is updated.</p>

<h2>First-Time Setup</h2>
<pre><code class="language-bash"># 1. Generate a secret key (any random string, 32+ chars recommended)
python3 -c "import secrets; print(secrets.token_hex(32))"

# 2. Add to .env
ADMIN_SECRET_KEY=&lt;output from above&gt;
ADMIN_USERNAME=admin
ADMIN_PASSWORD=your-secure-password   # change from default

# 3. Start the console
devtrack admin-start</code></pre>

<h2>Design Notes</h2>
<ul>
<li><strong>Dark theme</strong> — matches the DevTrack aesthetic; inherits CSS variables so it respects the system theme.</li>
<li><strong>No JS build step</strong> — HTMX is loaded from CDN; all interactivity is server-rendered HTML fragments. Works without a bundler.</li>
<li><strong>Separate from the webhook server</strong> — the admin console and the webhook server (port 8089) are two distinct FastAPI apps. Stopping the admin console does not affect webhook delivery.</li>
<li><strong>All state in SQLite</strong> — user records, API keys, and audit log entries are stored in <code>Data/devtrack.db</code> alongside all other DevTrack runtime state. No separate database or file is required.</li>
</ul>

<blockquote><p><strong>Storage note:</strong> All DevTrack state — trigger history, work sessions, sync cache (Azure/GitLab items), learning data (consent, profile, samples), user records, and audit log — now lives in a single SQLite database at <code>Data/devtrack.db</code>. MongoDB remains the primary store when <code>MONGODB_URI</code> is set; SQLite is the always-available local fallback. No migration is needed for a clean install.</p></blockquote>
</div>`,

  SLACK_BOT: `<div class="md-body">
<h1>Slack Bot</h1>
<p>The Slack bot lets you control DevTrack from any Slack channel using a single slash command: <code>/devtrack &lt;subcommand&gt;</code>. It uses <strong>Socket Mode</strong> — no public URL, no firewall rules, no ngrok required.</p>

<h2>Setup</h2>

<h2>Configuration</h2>
<pre><code class="language-bash">SLACK_ENABLED=true

<h2>Proactive Notifications</h2>

  VACATION_MODE: `<div class="md-body">
<h1>Vacation Mode</h1>
<p>Vacation mode lets DevTrack run fully autonomously while you are away. Instead of firing the interactive work-update prompt, the system generates a work summary from recent git commits using the LLM, scores its own confidence, and (optionally) posts the update to your PM tool — no human in the loop required.</p>

<h2>Enabling Vacation Mode</h2>
<pre><code class="language-bash"># Turn on with optional end date and confidence threshold
devtrack vacation on
devtrack vacation on --until 2026-04-07
devtrack vacation on --until 2026-04-07 --threshold 0.8
devtrack vacation on --until 2026-04-07 --no-submit   # log only, don't post to PM

# Turn off
devtrack vacation off

# Check status
devtrack vacation status</code></pre>

<h2>How It Works</h2>
<ol>
<li>When the DevTrack timer fires (every <code>PROMPT_INTERVAL</code> minutes), the Python backend checks vacation mode before showing any interactive prompt.</li>
<li>If vacation mode is active, <code>VacationAutoResponder</code> collects the recent commits for the workspace and builds a context string.</li>
<li>The context is sent to the configured LLM provider with a prompt that asks for a 1-3 sentence work update <strong>and</strong> a <code>CONFIDENCE: 0.0–1.0</code> score on the same response.</li>
<li>If the confidence meets the configured threshold <strong>and</strong> <code>auto_submit</code> is enabled, the update is posted to the PM tool (Azure DevOps, GitHub, GitLab, or Jira) as a comment, prefixed with <em>"[Auto — vacation mode]"</em>.</li>
<li>If confidence is below threshold, the update is logged but not posted.</li>
</ol>

<h2>Telegram &amp; Slack</h2>
<p>Vacation mode can also be toggled from Telegram and Slack:</p>
<div class="table-wrap"><table>
<thead><tr><th>Telegram</th><th>Slack</th><th>Action</th></tr></thead>
<tbody>
<tr><td><code>/vacation on</code></td><td><code>/devtrack vacation on</code></td><td>Enable vacation mode (indefinite)</td></tr>
<tr><td><code>/vacation on --until 2026-04-07</code></td><td><code>/devtrack vacation on --until 2026-04-07</code></td><td>Enable until date</td></tr>
<tr><td><code>/vacation off</code></td><td><code>/devtrack vacation off</code></td><td>Disable vacation mode</td></tr>
<tr><td><code>/vacation status</code></td><td><code>/devtrack vacation status</code></td><td>Show current state</td></tr>
</tbody>
</table></div>

<h2>Configuration</h2>
<pre><code class="language-bash"># Minimum LLM confidence (0-1) to auto-submit a work update while on vacation
VACATION_CONFIDENCE_THRESHOLD=0.7

# Set to false to log auto-generated updates without posting to PM
VACATION_AUTO_SUBMIT=true</code></pre>
<p>These are the global defaults. The per-session <code>--threshold</code> and <code>--no-submit</code> flags override them and are stored in the database for the duration of vacation mode.</p>

<h2>Flags</h2>
<div class="table-wrap"><table>
<thead><tr><th>Flag</th><th>Description</th></tr></thead>
<tbody>
<tr><td><code>--until YYYY-MM-DD</code></td><td>Auto-expire vacation mode at end of this date</td></tr>
<tr><td><code>--threshold 0.0–1.0</code></td><td>Minimum confidence to auto-post (default: <code>0.7</code>)</td></tr>
<tr><td><code>--no-submit</code></td><td>Generate updates but never post them — logging only</td></tr>
</tbody>
</table></div>

<h2>Expiry</h2>
<p>If <code>--until</code> is set, vacation mode is treated as <strong>expired</strong> on the day after the end date. The daemon resumes normal prompting automatically. Run <code>devtrack vacation off</code> to clear the record explicitly.</p>

<h2>Database Storage</h2>
<p>Vacation state is stored as a single row in the <code>vacation_mode</code> table in <code>Data/devtrack.db</code>. All fields (<code>enabled</code>, <code>enabled_at</code>, <code>until</code>, <code>confidence_threshold</code>, <code>auto_submit</code>) are updated atomically on every <code>on</code> / <code>off</code> call — no config file is written.</p>
</div>`,

  CLOUD_MODE: `<div class="md-body">
<h1>Cloud Mode (CS-4)</h1>
<p>Cloud Mode lets you connect the DevTrack Go daemon on your developer machine to a remote, managed Python backend — no local Python installation required on the developer machine. The daemon uses your cloud credentials for all HTTP trigger POSTs, bypassing the local cert-pinning that applies to self-signed certificates in managed and external modes.</p>

<h2>Quick Start</h2>
<pre><code class="language-bash"># Log in to a remote DevTrack server
devtrack cloud login --url https://myserver.com --key your-api-key

# Check connection status (pings /health, fetches /version, shows key preview)
devtrack cloud status

# Disconnect and revert to managed mode
devtrack cloud logout</code></pre>

<h2>Server Modes</h2>
<div class="table-wrap"><table>
<thead><tr><th>Mode</th><th>Config</th><th>Use case</th></tr></thead>
<tbody>
<tr><td><code>managed</code> (default)</td><td><code>DEVTRACK_SERVER_MODE=managed</code></td><td>Local dev — daemon spawns Python subprocess automatically</td></tr>
<tr><td><code>external</code></td><td><code>DEVTRACK_SERVER_MODE=external</code> + <code>DEVTRACK_SERVER_URL=http://host:port</code></td><td>Docker or self-hosted Python backend; uses cert-pinning for TLS</td></tr>
<tr><td><code>cloud</code></td><td>Set via <code>devtrack cloud login</code></td><td>Hosted DevTrack backend; CA-signed cert; API key auth</td></tr>
</tbody>
</table></div>

<h2>How It Works</h2>
<ol>
<li><code>devtrack cloud login --url URL --key KEY</code> tests the <code>/health</code> endpoint, then writes credentials to <code>~/.devtrack/cloud.json</code> (chmod 0600). This file contains <code>mode</code>, <code>url</code>, and <code>api_key</code>.</li>
<li>When cloud mode is active, <code>IsCloudMode()</code> returns <code>true</code> and <code>IsLocalTLS()</code> returns <code>false</code> — the Go HTTP client skips the cert-pinning step that is used for self-signed local certificates, trusting the system CA store instead.</li>
<li>Every trigger POST and health-check request includes the API key in the <code>Authorization</code> header.</li>
<li><code>devtrack cloud logout</code> removes <code>~/.devtrack/cloud.json</code> and restores managed mode.</li>
</ol>

<h2>cloud.json Format</h2>
<pre><code class="language-json">{
  "mode": "cloud",
  "url": "https://myserver.com",
  "api_key": "your-api-key"
}</code></pre>
<p>The file is stored at <code>~/.devtrack/cloud.json</code> with permissions <code>0600</code> — readable only by the current user.</p>

<h2>Status Output</h2>
<p><code>devtrack cloud status</code> pings <code>/health</code> and reports the round-trip latency, fetches <code>/version</code> for the server version string, and displays a masked preview of the API key (first 8 chars + <code>…</code>) so you can confirm the right key is active without exposing it in the terminal.</p>

<h2>Configuration</h2>
<p>Cloud mode does not require any <code>.env</code> changes — credentials are stored in <code>~/.devtrack/cloud.json</code> and loaded at startup automatically. The existing <code>DEVTRACK_SERVER_MODE</code> and <code>DEVTRACK_SERVER_URL</code> variables are ignored when <code>cloud.json</code> is present.</p>

<blockquote><p><strong>Note:</strong> Cloud mode follows the local-first design principle. If the remote server is unreachable, the daemon logs the error and continues operating locally — git monitoring, scheduling, and SQLite logging all continue without interruption. Triggers are re-tried on the next cycle.</p></blockquote>
</div>`,

  TUI_DASHBOARD: `<div class="md-body">

<h3>1 — Overview</h3>
<p>At-a-glance summary of the running daemon:</p>
<ul>

<h3>3 — Workspaces</h3>

<div class="table-wrap"><table>

</tbody>
</table></div>

<h3>4 — Alerts</h3>
<p>The last 30 ticket notifications from the SQLite <code>notifications</code> table — written there by the alert poller as a dual-write alongside MongoDB. Shows source (github / azure / jira), event type, ticket ID, summary, and read/unread state. This tab works fully offline (no MongoDB required).</p>

  TELEMETRY: `<div class="md-body">
<h1>Telemetry</h1>
<div class="home-badge" style="margin-bottom:24px;background:var(--callout-tip);border-color:var(--callout-tip-border);color:#166534;">Tier 2 implemented (v1.4-dev) — Tier 1 &amp; 3 planned</div>

<p>DevTrack's telemetry system is a <strong>privacy-first, three-tier</strong> approach to understanding how many people download and use the tool — without ever collecting personal data. Telemetry is always opt-in and the binary works identically with it on or off.</p>

<blockquote><p><strong>Status (v1.4-dev):</strong> Tier-2 anonymous install and active pings are now implemented in <code>devtrack-bin/ping.go</code> and sent to <code>https://ping.devtrack.dev</code> (Cloudflare Worker). Two events fire: <code>install</code> on first run and <code>active</code> at most once per 24 hours. Tier-1 (GitHub Releases download stats) and Tier-3 (registered-user heartbeats) remain planned.</p></blockquote>

<h2>Three Tiers at a Glance</h2>
<div class="table-wrap"><table>
<thead><tr><th>Tier</th><th>Source</th><th>What it measures</th><th>Code needed</th></tr></thead>
<tbody>
<tr><td><strong>1 — Downloads</strong></td><td>GitHub Releases API</td><td>Binary download counts per release, star count, forks</td><td>None — polled every 15 min by the server</td></tr>
<tr><td><strong>2 — Anonymous usage</strong></td><td>Go binary (opt-in)</td><td>install / command / heartbeat / signup events; random UUID; no PII</td><td><code>devtrack-bin/telemetry.go</code> + CLI wiring</td></tr>
<tr><td><strong>3 — Registered users</strong></td><td>CS-4 cloud server</td><td><code>api_keys.last_seen_at</code> — active registered users (D1/D7/D30)</td><td><code>api_keys</code> table extension</td></tr>
</tbody>
</table></div>

<h2>Privacy Design</h2>
<div class="table-wrap"><table>
<thead><tr><th>Property</th><th>Detail</th></tr></thead>
<tbody>
<tr><td><strong>Default OFF</strong></td><td>Telemetry is disabled until you explicitly run <code>devtrack telemetry on</code></td></tr>
<tr><td><strong>Anonymous UUID</strong></td><td><code>install_id</code> is a random UUID with no link to your identity, email, or machine name</td></tr>
<tr><td><strong>No PII ever</strong></td><td>Repo paths, commit messages, file names, usernames, API keys, and workspace names are never sent</td></tr>
<tr><td><strong>Local-first safe</strong></td><td>All telemetry POSTs are fire-and-forget on a goroutine; failures are silent and never block the CLI</td></tr>
<tr><td><strong>Transparent</strong></td><td><code>devtrack telemetry status</code> shows the exact payload that would be sent on the next event</td></tr>
</tbody>
</table></div>

<h3>What Is Sent</h3>
<div class="table-wrap"><table>
<thead><tr><th>Event</th><th>Trigger</th><th>Payload (no PII)</th></tr></thead>
<tbody>
<tr><td><code>install</code></td><td>First <code>devtrack telemetry on</code></td><td><code>version</code>, <code>os</code>, <code>arch</code></td></tr>
<tr><td><code>command</code></td><td>Each CLI invocation</td><td>Command name only (e.g. <code>work</code>, <code>tui</code>, <code>cloud</code>)</td></tr>
<tr><td><code>heartbeat</code></td><td>Daemon startup</td><td><code>version</code>, <code>active_features</code> bitmask</td></tr>
<tr><td><code>signup</code></td><td><code>devtrack cloud login</code> succeeds</td><td><code>version</code>, <code>os</code> only</td></tr>
</tbody>
</table></div>

<h3>What Is Never Sent</h3>
<ul>
<li>Repo paths or names</li>
<li>Commit messages or hashes</li>
<li>File names or diffs</li>
<li>Usernames or emails</li>
<li>API keys or tokens</li>
<li>Workspace names or ticket IDs</li>
</ul>

<h2>CLI Reference</h2>
<div class="table-wrap"><table>
<thead><tr><th>Command</th><th>Description</th></tr></thead>
<tbody>
<tr><td><code>devtrack telemetry on</code></td><td>Enable telemetry; generate <code>install_id</code> UUID if not already present; fire the <code>install</code> event</td></tr>
<tr><td><code>devtrack telemetry off</code></td><td>Disable telemetry; <code>install_id</code> is retained so re-enabling is seamless</td></tr>
<tr><td><code>devtrack telemetry status</code></td><td>Show enabled/disabled state, the first 8 chars of your <code>install_id</code>, and the exact payload that would be sent on the next event</td></tr>
</tbody>
</table></div>

<p>State is stored in <code>~/.devtrack/telemetry.json</code> (chmod 0600):</p>
<pre><code class="language-json">{
  "enabled": true,
  "install_id": "a3f8c2d1-…",
  "opted_in_at": "2026-03-29T10:00:00Z"
}</code></pre>

<h2>Real-Time Admin Dashboard</h2>
<p>When telemetry is enabled on the server, the Admin Console gains a live telemetry panel powered by <strong>Server-Sent Events (SSE) + HTMX</strong> — no JavaScript needed on the frontend.</p>

<h3>How It Works</h3>
<ol>
<li>Each <code>POST /telemetry/event</code> from a client binary inserts a row into <code>telemetry_events</code> and pushes the event into an <code>asyncio.Queue</code>.</li>
<li>The SSE endpoint (<code>GET /admin/telemetry/stream</code>) streams two event types:
  <ul>
    <li><code>counters</code> — aggregate stats (DAU, MAU, signups today, command histogram) pushed every 5 seconds</li>
    <li><code>live_event</code> — individual event row pushed immediately on each INSERT</li>
  </ul>
</li>
<li>HTMX on the admin dashboard subscribes to the SSE stream and swaps rendered HTML fragments directly — the server returns HTML, not raw JSON, so no client-side rendering is needed.</li>
</ol>

<pre><code class="language-html">&lt;!-- One persistent SSE connection; HTMX handles reconnect --&gt;
&lt;div hx-ext="sse" sse-connect="/admin/telemetry/stream"&gt;
  &lt;div id="stats-panel" sse-swap="counters" hx-swap="outerHTML"&gt;&lt;/div&gt;
  &lt;table&gt;
    &lt;tbody id="live-feed" sse-swap="live_event" hx-swap="afterbegin"&gt;&lt;/tbody&gt;
  &lt;/table&gt;
&lt;/div&gt;</code></pre>

<h3>GitHub Download Counts</h3>
<p>A background task on the server polls the GitHub Releases API every 15 minutes and caches the result in memory. Download counts are surfaced in the admin dashboard alongside live event counts — no binary changes needed for this tier.</p>
<pre><code class="language-bash"># Manual query (no auth needed for public repos)
curl -s https://api.github.com/repos/sraj0501/automation_tools/releases \
  | jq '[.[] | {tag: .tag_name, downloads: [.assets[].download_count] | add}]'</code></pre>

<h2>Data Model</h2>
<h3>telemetry_events table</h3>
<pre><code class="language-sql">CREATE TABLE telemetry_events (
    id           INTEGER PRIMARY KEY AUTOINCREMENT,
    install_id   TEXT    NOT NULL,       -- random UUID; stable per install
    event        TEXT    NOT NULL,       -- "install"|"command"|"heartbeat"|"signup"
    props        TEXT    DEFAULT '{}',   -- JSON: {command, version, os, arch, features}
    received_at  TEXT    NOT NULL DEFAULT (datetime('now'))
);</code></pre>

<h2>New .env Variables</h2>
<div class="table-wrap"><table>
<thead><tr><th>Variable</th><th>Description</th></tr></thead>
<tbody>
<tr><td><code>TELEMETRY_ENABLED</code></td><td>Set to <code>true</code> to enable the <code>/telemetry/event</code> endpoint on the server (default: <code>false</code>)</td></tr>
<tr><td><code>GITHUB_REPO_SLUG</code></td><td>GitHub repo slug for download count polling (e.g. <code>sraj0501/automation_tools</code>)</td></tr>
</tbody>
</table></div>

<h2>New Files (to be created)</h2>
<div class="table-wrap"><table>
<thead><tr><th>File</th><th>Purpose</th></tr></thead>
<tbody>
<tr><td><code>devtrack-bin/telemetry.go</code></td><td><code>TelemetryConfig</code>, <code>LoadTelemetryConfig()</code>, <code>SaveTelemetryConfig()</code>, <code>Track(event, props)</code> (non-blocking goroutine POST), <code>handleTelemetry()</code> CLI dispatcher</td></tr>
<tr><td><code>backend/telemetry/__init__.py</code></td><td>Package init</td></tr>
<tr><td><code>backend/telemetry/store.py</code></td><td><code>TelemetryStore</code>: INSERT event, aggregate queries (DAU, MAU, signups, command histogram)</td></tr>
<tr><td><code>backend/telemetry/router.py</code></td><td>FastAPI router: <code>POST /telemetry/event</code>, <code>GET /admin/telemetry/stream</code> (SSE)</td></tr>
<tr><td><code>backend/telemetry/github_stats.py</code></td><td>Background poller for GitHub Releases download counts (15-min interval)</td></tr>
<tr><td><code>backend/telemetry/stream.py</code></td><td><code>asyncio.Queue</code> shared state, <code>push_live_event()</code>, SSE generator</td></tr>
</tbody>
</table></div>

<blockquote><p><strong>Implementation status (v1.4-dev):</strong> Tier-2 anonymous pings are now implemented in <code>devtrack-bin/ping.go</code>. The <code>install</code> event fires on the first daemon start; the <code>active</code> event fires at most once per 24 hours. Both are fire-and-forget goroutines to a Cloudflare Worker at <code>https://ping.devtrack.dev</code>. The server-side foundation, real-time admin dashboard (Tier 1 GitHub stats, Tier 2 SSE live feed), and Tier-3 registered-user heartbeats described above remain planned. The four-phase implementation plan is documented in <code>docs/TELEMETRY_PLAN.md</code>.</p></blockquote>
</div>`,

  LICENSE: `<div class="md-body">
<h1>License</h1>
<p>DevTrack uses a <strong>Community License</strong> — free for individuals and small teams, with a commercial licence required for larger organisations and hosted deployments.</p>

<h2>Tiers at a Glance</h2>
<div class="table-wrap"><table>
<thead><tr><th>Tier</th><th>Cost</th><th>Who it is for</th></tr></thead>
<tbody>
<tr><td><strong>Personal</strong></td><td>Free</td><td>Single developer, personal use</td></tr>
<tr><td><strong>Team</strong></td><td>Free</td><td>Self-hosted, up to 10 users</td></tr>
<tr><td><strong>Enterprise</strong></td><td>Commercial licence required</td><td>11+ users, or any hosted/SaaS deployment</td></tr>
</tbody>
</table></div>

<blockquote><p>All tiers work fully offline. Login is optional for Personal and Team. No licence server call is ever made in local mode.</p></blockquote>

<h2>First-Run T&amp;C Acceptance</h2>
<p>The first time DevTrack starts (or when you run <code>devtrack terms</code>), a summary of the Terms of Service is printed to the terminal and you are asked to accept before the daemon starts. Acceptance is stored in <code>Data/license/acceptance.json</code> — no network call is required.</p>

<h3>CLI Commands</h3>
<div class="table-wrap"><table>
<thead><tr><th>Command</th><th>Description</th></tr></thead>
<tbody>
<tr><td><code>devtrack terms</code></td><td>Print the T&amp;C summary and prompt for acceptance</td></tr>
<tr><td><code>devtrack terms --accept</code></td><td>Accept non-interactively (useful for CI/scripts — same as <code>DEVTRACK_AUTO_ACCEPT_TERMS=1</code>)</td></tr>
<tr><td><code>devtrack license</code></td><td>Show the active tier and acceptance status</td></tr>
</tbody>
</table></div>

<h3>Non-Interactive / CI Mode</h3>
<p>Set <code>DEVTRACK_AUTO_ACCEPT_TERMS=1</code> in your environment or pass <code>--accept</code> to <code>devtrack terms</code> to suppress the interactive prompt. A warning is printed to stderr so the auto-acceptance is visible in CI logs.</p>

<h3>Acceptance Record</h3>
<p>The acceptance file is stored at <code>Data/license/acceptance.json</code> (path resolves from <code>DATA_DIR</code> if set):</p>
<pre><code class="language-json">{
  "terms_version": "1.0",
  "accepted_at": "2026-03-31T10:00:00+00:00",
  "user_identifier": "sraj",
  "mode": "local"
}</code></pre>
<p>The daemon checks <code>terms_version</code> on startup. If a new version of the terms is released, you will be prompted again on the next start.</p>

<h2>Enterprise Licensing</h2>
<p>If you are deploying DevTrack for 11 or more users, or running it as a hosted/SaaS service, a commercial enterprise licence is required. Contact <a href="mailto:enterprise@devtrack.dev" target="_blank" rel="noopener">enterprise@devtrack.dev</a> or visit <a href="https://devtrack.dev/enterprise" target="_blank" rel="noopener">devtrack.dev/enterprise</a>.</p>
<p>In a self-hosted deployment, <code>backend/license_manager.py</code> detects the tier from the user count in the Admin Console. Tier enforcement is advisory in local mode — the daemon will warn but not block. In SaaS mode, the tier is enforced server-side.</p>

<h2>Privacy Summary</h2>
<ul>
<li><strong>Offline/local mode</strong>: zero data collection (default).</li>
<li><strong>Telemetry</strong>: strictly opt-in — only when you run <code>devtrack telemetry on</code> explicitly.</li>
<li><strong>Your code, commits, and work updates</strong> never leave your machine unless you enable cloud features.</li>
<li><strong>Login</strong>: optional for Personal and Team tiers. Magic-link login is used only if <code>DEVTRACK_API_URL</code> is set.</li>
</ul>

<p>Full terms: <code>TERMS.md</code> in the DevTrack installation directory, or <a href="https://devtrack.dev/terms" target="_blank" rel="noopener">devtrack.dev/terms</a>.</p>
</div>`,

  AUTH: `<div class="md-body">
<h1>Login &amp; Auth</h1>
<p>DevTrack's authentication system is <strong>optional and offline-first</strong>. The daemon works fully without any login. Login is only needed for cloud features — syncing settings across machines, SaaS team management, or enterprise licence validation.</p>

<h2>Overview</h2>
<div class="table-wrap"><table>
<thead><tr><th>Scenario</th><th>Login needed?</th></tr></thead>
<tbody>
<tr><td>Local single-user (Personal/Team)</td><td>No — works offline without any auth</td></tr>
<tr><td>Cloud-backed settings sync</td><td>Yes — <code>devtrack login</code></td></tr>
<tr><td>Enterprise team management</td><td>Yes — admin login via Admin Console</td></tr>
</tbody>
</table></div>

<h2>CLI Commands</h2>
<div class="table-wrap"><table>
<thead><tr><th>Command</th><th>Description</th></tr></thead>
<tbody>
<tr><td><code>devtrack login</code></td><td>Start the magic-link login flow — enter your email, receive a one-time code, confirm it</td></tr>
<tr><td><code>devtrack logout</code></td><td>Clear the local session and token</td></tr>
<tr><td><code>devtrack whoami</code></td><td>Show the currently logged-in email (or "not logged in")</td></tr>
</tbody>
</table></div>

<h2>Magic-Link Flow</h2>
<ol>
<li>Run <code>devtrack login</code> and enter your email address.</li>
<li>The backend (<code>DEVTRACK_API_URL</code>) sends a one-time code to that address.</li>
<li>Enter the code in the terminal — you receive a JWT session token.</li>
<li>The token and session are saved locally in <code>Data/license/session.json</code> (chmod 0600).</li>
</ol>

<p>If <code>DEVTRACK_API_URL</code> is not set, the login command falls back to creating a <strong>local-only session</strong> — no network call is made and no token is issued, but your email is stored as a local identifier (useful for personalisation features).</p>

<h3>Session File</h3>
<p>Sessions are stored at <code>Data/license/session.json</code>:</p>
<pre><code class="language-json">{
  "email": "you@example.com",
  "token": "eyJ...",
  "logged_in_at": "2026-03-31T10:00:00+00:00",
  "expires_at": "2026-04-30T10:00:00+00:00"
}</code></pre>
<p>Sessions expire after 30 days. Run <code>devtrack login</code> again to refresh.</p>

<h2>Local-Only Sessions</h2>
<p>If you want personalisation features (e.g. "Talk Like You") to identify you without cloud connectivity, run <code>devtrack login</code> with no <code>DEVTRACK_API_URL</code> set. The system creates an offline session with your email stored locally — used as the identifier for MongoDB sample storage and the personalization profile.</p>

<h2>Configuration</h2>
<div class="table-wrap"><table>
<thead><tr><th>Variable</th><th>Description</th></tr></thead>
<tbody>
<tr><td><code>DEVTRACK_API_URL</code></td><td>Cloud API endpoint for magic-link auth. Omit for local-only sessions.</td></tr>
</tbody>
</table></div>

<h2>Implementation Files</h2>
<div class="table-wrap"><table>
<thead><tr><th>File</th><th>Purpose</th></tr></thead>
<tbody>
<tr><td><code>backend/auth/__init__.py</code></td><td>Package init; exports <code>get_session()</code>, <code>require_login()</code></td></tr>
<tr><td><code>backend/auth/local_auth.py</code></td><td>Read/write <code>Data/license/session.json</code>; no network calls</td></tr>
<tr><td><code>backend/auth/cloud_auth.py</code></td><td>Magic-link flow: <code>request_magic_link()</code>, <code>verify_code()</code>; degrades gracefully offline</td></tr>
<tr><td><code>backend/auth/session.py</code></td><td><code>AuthSession</code> dataclass; <code>make_offline_session()</code>; 30-day TTL</td></tr>
</tbody>
</table></div>

<blockquote><p><strong>Security note:</strong> The session file is written with <code>chmod 0600</code> — readable only by the current user. Tokens are JWTs issued by the DevTrack cloud server; they are verified server-side on each cloud API call. Local-only sessions have no token and no server-side state.</p></blockquote>
</div>`,

  TEST_SUITE: `<div class="md-body">
<h1>Test Suite</h1>
<p>DevTrack ships a comprehensive test suite covering the Go daemon, the Python backend, and the HTTP trigger layer. As of <strong>v1.4-dev</strong>, the suite contains <strong>159+ tests</strong> spread across Go and Python, with full coverage of HTTP trigger validation, admin authentication, user management, license enforcement, and Jira alerter polling.</p>

<h2>Running the Tests</h2>
<h3>Go tests</h3>
<pre><code class="language-bash">cd devtrack-bin
go test ./...        # run all Go tests
go test -run TestHTTPTrigger ./...   # run only HTTP trigger tests</code></pre>

<h3>Python tests</h3>
<pre><code class="language-bash"># Install / sync dependencies first
uv sync

# Run the full Python test suite
uv run pytest backend/tests/

# Run a single test file
uv run pytest backend/tests/test_http_triggers.py
uv run pytest backend/tests/test_admin_auth.py
uv run pytest backend/tests/test_admin_user_manager.py
uv run pytest backend/tests/test_license_manager.py
uv run pytest backend/tests/test_jira_alerter.py

# Run by name filter
uv run pytest backend/tests/ -k test_name</code></pre>

<h2>Test Files</h2>
<div class="table-wrap"><table>
<thead><tr><th>File</th><th>Layer</th><th>What it covers</th></tr></thead>
<tbody>
<tr><td><code>devtrack-bin/http_trigger_test.go</code></td><td>Go</td><td>HTTP trigger validation — correct payloads accepted, malformed or unauthenticated requests rejected, edge cases for missing fields and invalid JSON</td></tr>
<tr><td><code>backend/tests/test_http_triggers.py</code></td><td>Python</td><td>End-to-end HTTP trigger handling in the FastAPI webhook server — commit and timer trigger routes, auth header validation, payload schema enforcement</td></tr>
<tr><td><code>backend/tests/test_admin_auth.py</code></td><td>Python</td><td>Admin console authentication — login flow, JWT session cookie issuance, expiry, and rejection of bad credentials</td></tr>
<tr><td><code>backend/tests/test_admin_user_manager.py</code></td><td>Python</td><td>User lifecycle via the Admin Console — create, delete, list, and API key rotation; enforces that duplicate usernames are rejected</td></tr>
<tr><td><code>backend/tests/test_license_manager.py</code></td><td>Python</td><td>License tier detection, T&amp;C acceptance recording and re-prompt logic, offline vs SaaS mode enforcement, <code>DEVTRACK_AUTO_ACCEPT_TERMS</code> flag behaviour</td></tr>
<tr><td><code>backend/tests/test_jira_alerter.py</code></td><td>Python</td><td>26 tests for <code>JiraAlerter</code> — assigned polling, comment detection, status-change events, deduplication, and all edge cases. No real network calls — all <code>JiraClient</code> methods are mocked.</td></tr>
</tbody>
</table></div>

<h2>Test Infrastructure</h2>

<h3>conftest.py — session fixture</h3>
<p>The shared <code>backend/tests/conftest.py</code> adds the repo root to <code>sys.path</code> and provides a <strong>session-scoped fixture</strong> that blocks any attempt to load a <code>.env</code> that is a named pipe (FIFO). This prevents the Go daemon's FIFO <code>.env</code> bug from silently hanging the test process during collection.</p>
<pre><code class="language-python"># conftest.py (excerpt)
@pytest.fixture(scope="session", autouse=True)
def block_fifo_env(tmp_path_factory):
    """Ensure .env is never a FIFO during the test run — prevents daemon-startup hangs."""
    env_path = Path(".env")
    if env_path.exists() and stat.S_ISFIFO(env_path.stat().st_mode):
        raise RuntimeError(
            ".env is a named pipe (FIFO). Replace it with a regular file before running tests."
        )
    yield</code></pre>

<h3>LLM provider isolation</h3>
<p>Tests that change <code>LLM_PROVIDER</code> must call <code>reset_provider_cache()</code> in their setup and teardown to prevent provider state leaking between test cases:</p>
<pre><code class="language-python">from backend.llm.provider_factory import reset_provider_cache

def setup_function():
    reset_provider_cache()

def teardown_function():
    reset_provider_cache()</code></pre>

<h2>Known Bugs Fixed by These Tests</h2>
<div class="table-wrap"><table>

<h2>ignore_branches Field <span style="font-size:.75rem;font-weight:400;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent);border-radius:99px;padding:1px 8px;margin-left:6px;">v1.4-dev</span></h2>

<h2>How Routing Works</h2>
<ol>
<li>Go daemon detects a commit in a workspace path</li>
<li>If the current branch matches an <code>ignore_branches</code> pattern, the event is dropped immediately</li>
<li>The trigger message includes <code>pm_platform</code>, <code>pm_project</code>, <code>pm_milestone</code>, and <code>workspace_name</code></li>

<li>Azure, GitHub, GitLab, and Jira are all skipped for platform values that don't match</li>

<p>When <code>pm_platform</code> is empty or <code>workspaces.yaml</code> is absent, the legacy priority chain runs: Azure → GitLab → GitHub, stopping at the first match.</p>

<h2>Troubleshooting</h2>

<li><strong>Commits routing to wrong platform</strong> — confirm <code>pm_platform</code> matches one of <code>azure | gitlab | github | jira | none</code>; an unknown value falls back to the priority chain</li>

</ul>

  AUTOSTART: `<div class="md-body">
<h1>Auto-Start</h1>
<p>Automatically start the DevTrack daemon when you log in, using the right mechanism for your operating system.</p>

<div class="home-badge" style="margin-bottom:24px;background:var(--callout-note);border-color:var(--callout-note-border);color:#1d4ed8;">v1.4-dev — Env-baking: all current env vars are now baked into the generated plist/service unit automatically</div>

<h2>Quick Start</h2>
<pre><code class="language-bash">devtrack autostart-install    # Install and enable auto-start (bakes env vars)
devtrack autostart-status     # Verify it is registered
devtrack autostart-uninstall  # Remove auto-start at any time</code></pre>

<p>DevTrack detects your OS and picks the appropriate mechanism automatically:</p>
<div class="table-wrap"><table>
<thead><tr><th>OS</th><th>Mechanism</th><th>Location</th></tr></thead>
<tbody>
<tr><td>macOS</td><td>launchd LaunchAgent</td><td><code>~/Library/LaunchAgents/dev.devtrack.plist</code></td></tr>
<tr><td>Linux with systemd</td><td>systemd user service</td><td><code>~/.config/systemd/user/devtrack.service</code></td></tr>
<tr><td>WSL with systemd</td><td>systemd user service</td><td><code>~/.config/systemd/user/devtrack.service</code></td></tr>
<tr><td>WSL without systemd</td><td>Shell profile block</td><td><code>~/.zshrc</code> or <code>~/.bashrc</code></td></tr>
</tbody>
</table></div>

<h2>Env-Baking (v1.4-dev)</h2>
<p>As of v1.4-dev, <code>devtrack autostart-install</code> <strong>bakes all current environment variables</strong> into the generated plist (macOS) or systemd unit (Linux) at install time. This means the daemon inherits the exact same configuration that was active when you ran <code>autostart-install</code> — no wrapper scripts, no <code>EnvironmentFile=</code> hacks, and no separate <code>.env</code> file needed at runtime.</p>

<blockquote><p><strong>Important:</strong> Re-run <code>devtrack autostart-install</code> after changing any environment variable to refresh the baked configuration in the plist or service unit.</p></blockquote>

<pre><code class="language-bash"># First time (or after changing env vars):
set -a; source .env; set +a   # export all vars into the shell
devtrack autostart-install    # bakes them into the plist/service unit

# Verify
devtrack autostart-status</code></pre>

<h2>macOS — launchd</h2>
<p>DevTrack registers as a <strong>user-level LaunchAgent</strong>, which starts when you log in and runs with your permissions.</p>

<h3>Install</h3>
<pre><code class="language-bash">devtrack autostart-install</code></pre>
<p>This command:</p>
<ol>
<li>Captures all currently exported environment variables</li>
<li>Generates a plist at <code>~/Library/LaunchAgents/dev.devtrack.plist</code> with all env vars inline under <code>EnvironmentVariables</code></li>
<li>Runs <code>launchctl load</code> to register and start the service immediately</li>
</ol>

<h3>Status &amp; Manual Control</h3>
<pre><code class="language-bash">devtrack autostart-status
launchctl list | grep devtrack          # PID column: number = running
launchctl start dev.devtrack            # Start without waiting for next login
launchctl stop  dev.devtrack            # Stop (will restart on next login)
cat ~/Library/LaunchAgents/dev.devtrack.plist  # Inspect baked env vars</code></pre>

<h3>Uninstall</h3>
<pre><code class="language-bash">devtrack autostart-uninstall</code></pre>

<h2>Linux — systemd user service</h2>
<p>DevTrack installs a <strong>systemd user service</strong> (<code>--user</code> scope), which starts at login and runs as your user account.</p>

<h3>Install</h3>
<pre><code class="language-bash">devtrack autostart-install</code></pre>
<p>Generates <code>~/.config/systemd/user/devtrack.service</code> with all env vars inlined as <code>Environment=</code> lines, then runs <code>systemctl --user daemon-reload &amp;&amp; enable &amp;&amp; start</code>.</p>

<h3>Status &amp; Manual Control</h3>
<pre><code class="language-bash">devtrack autostart-status
systemctl --user status devtrack
systemctl --user restart devtrack
journalctl --user -u devtrack -f        # Follow logs</code></pre>

<h3>Uninstall</h3>
<pre><code class="language-bash">devtrack autostart-uninstall</code></pre>

<h2>WSL — Shell Profile Fallback</h2>
<p>When systemd is not available in WSL, DevTrack appends a startup block to <code>~/.zshrc</code> (or <code>~/.bashrc</code>). The block is idempotent — running <code>autostart-install</code> again when the block is already present is a no-op.</p>
<pre><code class="language-bash"># DevTrack auto-start
devtrack start 2&gt;/dev/null || true
# End DevTrack auto-start</code></pre>
<p>After installation, re-source your profile or open a new terminal to start DevTrack in the current session.</p>

<h2>Troubleshooting</h2>
<ul>
<li><strong>Daemon did not start after login (macOS)</strong> — run <code>tail -50 Data/logs/launchd.log</code> and <code>plutil ~/Library/LaunchAgents/dev.devtrack.plist</code>. If env vars are missing, re-run <code>autostart-install</code> after sourcing <code>.env</code>.</li>
<li><strong>Daemon did not start after login (Linux)</strong> — run <code>systemctl --user status devtrack</code> and <code>journalctl --user -u devtrack --no-pager | tail -50</code>. Check the <code>Environment=</code> lines in the unit file match your expected values.</li>
<li><strong>Config changes not taking effect</strong> — remember to re-run <code>devtrack autostart-install</code> after changing env vars; the new values are only baked in on reinstall.</li>
<li><strong>"autostart-install already present" warning (WSL no-systemd)</strong> — run <code>devtrack autostart-uninstall</code> first, then reinstall.</li>
</ul>
</div>`,

// ── Inline Content Renderer ───────────────────────────────────────────────────
function renderInlineContent(id) {
  const content = document.getElementById('content');
  content.innerHTML = CONTENT[id];
  addCodeToolbars(content);
  hljs.highlightAll();
  buildTOC(content);
}

// ── Load & Render Markdown ────────────────────────────────────────────────────
async function loadMarkdown(id) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="state-msg"><div class="spinner"></div><span>Loading…</span></div>';

  const url = DOCS_BASE + id + '.md';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    renderMarkdown(md, content);
  } catch (err) {
    content.innerHTML = `
      <div class="state-msg">
        <svg width="40" height="40" viewBox="0 0 20 20" fill="currentColor" style="opacity:.3"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <strong>Could not load ${id}.md</strong>
        <span style="font-size:.8rem;max-width:320px;">
          This wiki needs to be served over HTTP, not opened as a local file.<br>
          Run: <code style="font-family:monospace;background:var(--code-bg);padding:1px 5px;border-radius:4px;">python3 -m http.server 8080</code> from the project root, then visit <code style="font-family:monospace;background:var(--code-bg);padding:1px 5px;border-radius:4px;">localhost:8080/wiki/</code>
        </span>
      </div>`;
  }
}

function renderMarkdown(md, container) {
  // Configure marked
  marked.setOptions({ breaks: true, gfm: true });

  const renderer = new marked.Renderer();

  // Wrap tables
  renderer.table = (header, body) =>
    `<div class="table-wrap"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;

  // Open external links in new tab, rewrite internal .md links
  renderer.link = (href, title, text) => {
    if (href && href.endsWith('.md')) {
      const id = href.replace(/.*\//, '').replace('.md', '');
      return `<a href="#${id}" onclick="navigate('${id}');return false;"${title ? ` title="${title}"` : ''}>${text}</a>`;
    }
    const ext = href && !href.startsWith('#') && !href.startsWith('./') && !href.startsWith('../');
    return `<a href="${href}"${title ? ` title="${title}"` : ''}${ext ? ' target="_blank" rel="noopener"' : ''}>${text}</a>`;
  };

  marked.use({ renderer });

  const html = marked.parse(md);
  container.innerHTML = `<div class="md-body">${html}</div>`;

  addCodeToolbars(container);
  hljs.highlightAll();
  buildTOC(container);
}

// ── Code Toolbars & Copy Buttons ──────────────────────────────────────────────
function addCodeToolbars(container) {
  container.querySelectorAll('pre').forEach(pre => {
    const code = pre.querySelector('code');
    if (!code) return;
    const lang = (code.className.match(/language-(\w+)/) || [])[1] || '';
    const toolbar = document.createElement('div');
    toolbar.className = 'code-toolbar';
    toolbar.innerHTML = `
      <span class="code-lang">${lang}</span>
      <button class="copy-btn" onclick="copyCode(this)">Copy</button>
    `;
    pre.insertBefore(toolbar, code);
  });
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code');
  navigator.clipboard.writeText(code.innerText).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Table of Contents ─────────────────────────────────────────────────────────
function buildTOC(container) {
  const headings = container.querySelectorAll('h2, h3');
  if (headings.length < 3) return;

  const existing = document.querySelector('.toc-panel');
  if (existing) existing.remove();

  const toc = document.createElement('div');
  toc.className = 'toc-panel';
  toc.innerHTML = '<h6>On this page</h6>';

  headings.forEach((h, i) => {
    const id = 'heading-' + i;
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent;
    a.className = h.tagName === 'H3' ? 'toc-h3' : '';
    a.onclick = (e) => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    toc.appendChild(a);
  });

  document.querySelector('.main').appendChild(toc);

  // Highlight active TOC item on scroll
  const wrap = document.getElementById('contentWrap');
  wrap.addEventListener('scroll', () => {
    const links = toc.querySelectorAll('a');
    let active = null;
    headings.forEach((h, i) => {
      if (h.getBoundingClientRect().top < 100) active = i;
    });
    links.forEach((a, i) => a.classList.toggle('active', i === active));
  }, { passive: true });
}

// ── Search ────────────────────────────────────────────────────────────────────
let allItems = [];
NAV.forEach(g => g.items.forEach(item => allItems.push({ ...item, group: g.group })));

function handleSearch(e) {
  const q = e.target.value.trim().toLowerCase();
  const container = document.getElementById('searchResults');
  if (!q) { container.style.display = 'none'; return; }

  const results = allItems.filter(item =>
    item.label.toLowerCase().includes(q) ||
    item.group.toLowerCase().includes(q) ||
    item.id.toLowerCase().includes(q)
  );

  if (results.length === 0) {
    container.style.display = 'block';
    container.innerHTML = '<div class="search-no-results">No results found</div>';
    return;
  }

  container.style.display = 'block';
  container.innerHTML = results.slice(0, 8).map(item => `
    <div class="search-result-item" onclick="navigate('${item.id}'); clearSearch();">
      <div class="search-result-title">${item.label}</div>
      <div class="search-result-section">${item.group}</div>
    </div>
  `).join('');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').style.display = 'none';
}
