<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevTrack Docs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme" />
  <style>
    /* ── Reset & Tokens ───────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', monospace;

      --sidebar-w: 260px;
      --topbar-h: 52px;
      --content-max: 860px;
      --radius: 6px;
      --radius-lg: 10px;

      /* Light theme */
      --bg: #ffffff;
      --bg-subtle: #f8f8f8;
      --bg-muted: #f1f1f1;
      --border: #e5e5e5;
      --border-strong: #d0d0d0;
      --text: #111111;
      --text-muted: #666666;
      --text-faint: #999999;
      --accent: #0070f3;
      --accent-bg: #eff6ff;
      --accent-hover: #0060df;
      --sidebar-bg: #fafafa;
      --sidebar-border: #ebebeb;
      --code-bg: #f6f8fa;
      --code-border: #e1e4e8;
      --nav-hover: #f0f0f0;
      --nav-active-bg: #eff6ff;
      --nav-active-text: #0070f3;
      --scrollbar: #d8d8d8;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.07);
      --shadow-md: 0 4px 12px rgba(0,0,0,.10);
      --callout-note: #eff6ff;
      --callout-note-border: #93c5fd;
      --callout-tip: #f0fdf4;
      --callout-tip-border: #86efac;
      --callout-warn: #fffbeb;
      --callout-warn-border: #fcd34d;
    }

    [data-theme="dark"] {
      --bg: #111111;
      --bg-subtle: #1a1a1a;
      --bg-muted: #222222;
      --border: #2a2a2a;
      --border-strong: #3a3a3a;
      --text: #ededed;
      --text-muted: #a0a0a0;
      --text-faint: #666666;
      --accent: #3b82f6;
      --accent-bg: #1a2744;
      --accent-hover: #60a5fa;
      --sidebar-bg: #151515;
      --sidebar-border: #222222;
      --code-bg: #1c1c1c;
      --code-border: #2e2e2e;
      --nav-hover: #222222;
      --nav-active-bg: #1a2744;
      --nav-active-text: #60a5fa;
      --scrollbar: #333333;
      --callout-note: #1a2744;
      --callout-note-border: #2563eb;
      --callout-tip: #0f2a1a;
      --callout-tip-border: #16a34a;
      --callout-warn: #2a1e00;
      --callout-warn-border: #d97706;
    }

    [data-theme="dark"] #hljs-theme { display: none; }
    [data-theme="dark"] #hljs-theme-dark { display: block; }
    #hljs-theme-dark { display: none; }

    html { font-size: 15px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Scrollbar ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 99px; }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .layout { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ───────────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .2s ease, transform .2s ease;
      position: relative;
      z-index: 200;
    }
    .sidebar.collapsed { width: 0; }

    .sidebar-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--sidebar-border);
      flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .brand-icon {
      width: 30px; height: 30px; border-radius: 7px;
      background: var(--accent); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; flex-shrink: 0;
    }
    .brand-name { font-size: .95rem; font-weight: 700; letter-spacing: -.02em; }
    .brand-sub { font-size: .72rem; color: var(--text-faint); margin-top: 1px; }

    .sidebar-search {
      margin: 12px 12px 0;
      position: relative;
    }
    .sidebar-search input {
      width: 100%;
      padding: 7px 10px 7px 32px;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--sans);
      font-size: .8rem;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .sidebar-search input::placeholder { color: var(--text-faint); }
    .sidebar-search input:focus { border-color: var(--accent); }
    .sidebar-search svg {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; color: var(--text-faint); pointer-events: none;
    }

    .nav { flex: 1; overflow-y: auto; padding: 8px 0 16px; }

    .nav-group { margin-bottom: 2px; }
    .nav-group-label {
      padding: 8px 16px 4px;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-faint);
    }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px;
      font-size: .83rem;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      border-radius: 0;
      transition: background .1s, color .1s;
      border-left: 2px solid transparent;
      white-space: nowrap;
      overflow: hidden;
    }
    .nav-item:hover { background: var(--nav-hover); color: var(--text); }
    .nav-item.active {
      background: var(--nav-active-bg);
      color: var(--nav-active-text);
      border-left-color: var(--accent);
      font-weight: 500;
    }
    .nav-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: .7; }
    .nav-item.active svg { opacity: 1; }

    /* ── Topbar ────────────────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

    .topbar {
      height: var(--topbar-h);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
      background: var(--bg);
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-toggle {
      padding: 6px; border-radius: var(--radius);
      border: 1px solid var(--border);
      background: none; cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s;
    }
    .topbar-toggle:hover { background: var(--bg-muted); color: var(--text); }
    .topbar-toggle svg { width: 15px; height: 15px; }

    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: .82rem; color: var(--text-muted); flex: 1; }
    .breadcrumb .sep { opacity: .4; }
    .breadcrumb .current { color: var(--text); font-weight: 500; }

    .topbar-actions { display: flex; gap: 8px; margin-left: auto; }
    .icon-btn {
      padding: 6px; border-radius: var(--radius);
      border: 1px solid var(--border);
      background: none; cursor: pointer; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      transition: background .1s, color .1s; font-size: .8rem;
    }
    .icon-btn:hover { background: var(--bg-muted); color: var(--text); }
    .icon-btn svg { width: 15px; height: 15px; }

    .version-chip {
      font-size: .72rem; font-weight: 500; padding: 2px 8px;
      background: var(--bg-muted); border: 1px solid var(--border);
      border-radius: 99px; color: var(--text-muted);
    }

    /* ── Content Area ──────────────────────────────────────────────────── */
    .content-wrap { flex: 1; overflow-y: auto; }
    .content-inner {
      max-width: calc(var(--content-max) + 80px);
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    /* ── Loading / Error states ─────────────────────────────────────────── */
    .state-msg {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 300px; gap: 12px;
      color: var(--text-muted); font-size: .9rem; text-align: center;
    }
    .spinner {
      width: 28px; height: 28px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Home / Landing ─────────────────────────────────────────────────── */
    .home-hero {
      border-bottom: 1px solid var(--border);
      padding-bottom: 40px; margin-bottom: 48px;
    }
    .home-badge {
      display: inline-block; font-size: .72rem; font-weight: 600;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 99px;
      background: var(--accent-bg); color: var(--accent);
      border: 1px solid var(--accent); margin-bottom: 16px;
    }
    .home-title {
      font-size: 2.4rem; font-weight: 700; letter-spacing: -.04em;
      line-height: 1.15; color: var(--text); margin-bottom: 12px;
    }
    .home-title span { color: var(--accent); }
    .home-sub { font-size: 1.05rem; color: var(--text-muted); max-width: 560px; line-height: 1.65; }

    .home-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px; margin-bottom: 48px;
    }
    .home-card {
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      padding: 18px 20px; cursor: pointer; text-decoration: none;
      color: var(--text); background: var(--bg);
      transition: border-color .15s, box-shadow .15s, transform .1s;
      display: block;
    }
    .home-card:hover {
      border-color: var(--accent); box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .home-card-icon { font-size: 1.4rem; margin-bottom: 10px; }
    .home-card-title { font-size: .9rem; font-weight: 600; margin-bottom: 4px; }
    .home-card-desc { font-size: .8rem; color: var(--text-muted); line-height: 1.5; }

    .quick-start-box {
      background: var(--code-bg); border: 1px solid var(--code-border);
      border-radius: var(--radius-lg); padding: 20px 24px; margin-bottom: 48px;
    }
    .quick-start-box h3 { font-size: .95rem; margin-bottom: 14px; color: var(--text); }

    .feature-list { display: flex; flex-direction: column; gap: 12px; }
    .feature-item { display: flex; gap: 12px; align-items: flex-start; }
    .feature-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--accent-bg); border: 1px solid var(--accent);
      color: var(--accent); font-size: .65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .feature-item h4 { font-size: .88rem; font-weight: 600; margin-bottom: 2px; }
    .feature-item p { font-size: .82rem; color: var(--text-muted); }

    /* ── Markdown Rendered Content ─────────────────────────────────────── */
    .md-body { max-width: var(--content-max); }

    .md-body h1 {
      font-size: 1.9rem; font-weight: 700; letter-spacing: -.04em;
      line-height: 1.2; margin-bottom: 12px; color: var(--text);
      border-bottom: 1px solid var(--border); padding-bottom: 12px;
    }
    .md-body h2 {
      font-size: 1.3rem; font-weight: 600; letter-spacing: -.02em;
      line-height: 1.3; margin: 36px 0 12px; color: var(--text);
      border-bottom: 1px solid var(--border); padding-bottom: 8px;
    }
    .md-body h3 {
      font-size: 1.05rem; font-weight: 600;
      margin: 28px 0 8px; color: var(--text);
    }
    .md-body h4 {
      font-size: .93rem; font-weight: 600;
      margin: 20px 0 6px; color: var(--text);
    }
    .md-body h5, .md-body h6 {
      font-size: .88rem; font-weight: 600;
      margin: 16px 0 4px; color: var(--text-muted);
    }

    .md-body p { margin-bottom: 16px; }
    .md-body p:last-child { margin-bottom: 0; }

    .md-body a { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .1s; }
    .md-body a:hover { border-bottom-color: var(--accent); }

    .md-body ul, .md-body ol {
      padding-left: 24px; margin-bottom: 16px;
    }
    .md-body li { margin-bottom: 5px; }
    .md-body li p { margin-bottom: 4px; }

    .md-body strong { font-weight: 600; }
    .md-body em { font-style: italic; }

    .md-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px; margin: 20px 0;
      background: var(--accent-bg); border-radius: 0 var(--radius) var(--radius) 0;
    }
    .md-body blockquote p { color: var(--text-muted); margin: 0; font-size: .9rem; }

    .md-body hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

    /* ── Code ──────────────────────────────────────────────────────────── */
    .md-body code {
      font-family: var(--mono);
      font-size: .83em;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--text);
    }

    .md-body pre {
      position: relative;
      background: var(--code-bg);
      border: 1px solid var(--code-border);
      border-radius: var(--radius-lg);
      margin: 20px 0;
      overflow: hidden;
    }
    .md-body pre code {
      display: block;
      overflow-x: auto;
      padding: 16px 20px;
      background: transparent;
      border: none;
      border-radius: 0;
      font-size: .82rem;
      line-height: 1.65;
    }

    .code-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px 0;
    }
    .code-lang {
      font-size: .7rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase; color: var(--text-faint);
    }
    .copy-btn {
      font-family: var(--sans); font-size: .75rem;
      padding: 3px 10px; border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg); color: var(--text-muted);
      cursor: pointer; transition: all .1s; white-space: nowrap;
    }
    .copy-btn:hover { background: var(--bg-muted); color: var(--text); }
    .copy-btn.copied { color: #16a34a; border-color: #16a34a; }

    /* ── Tables ────────────────────────────────────────────────────────── */
    .md-body .table-wrap { overflow-x: auto; margin: 20px 0; }
    .md-body table {
      width: 100%; border-collapse: collapse;
      font-size: .85rem; border-radius: var(--radius-lg);
      overflow: hidden; border: 1px solid var(--border);
    }
    .md-body th {
      background: var(--bg-subtle); text-align: left;
      padding: 9px 14px; font-weight: 600; font-size: .82rem;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
    }
    .md-body td { padding: 9px 14px; border-bottom: 1px solid var(--border); }
    .md-body tr:last-child td { border-bottom: none; }
    .md-body tr:hover td { background: var(--bg-subtle); }

    /* ── Search Results ─────────────────────────────────────────────────── */
    .search-results {
      padding: 4px 0;
    }
    .search-result-item {
      padding: 8px 16px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .1s;
    }
    .search-result-item:hover {
      background: var(--nav-hover); border-left-color: var(--accent);
    }
    .search-result-title { font-size: .82rem; font-weight: 500; color: var(--text); }
    .search-result-section { font-size: .72rem; color: var(--text-faint); margin-top: 2px; }
    .search-no-results { padding: 12px 16px; font-size: .82rem; color: var(--text-faint); }

    /* ── TOC ────────────────────────────────────────────────────────────── */
    .toc-panel {
      position: fixed; right: 0; top: var(--topbar-h);
      width: 200px; height: calc(100vh - var(--topbar-h));
      overflow-y: auto; padding: 24px 16px;
      border-left: 1px solid var(--border);
      background: var(--bg);
      font-size: .78rem;
    }
    .toc-panel h6 {
      font-size: .68rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-faint);
      margin-bottom: 10px;
    }
    .toc-panel a {
      display: block; padding: 3px 0 3px 10px;
      color: var(--text-muted); text-decoration: none;
      border-left: 1px solid var(--border);
      transition: color .1s, border-color .1s;
      line-height: 1.5;
    }
    .toc-panel a:hover { color: var(--text); border-left-color: var(--accent); }
    .toc-panel a.active { color: var(--accent); border-left-color: var(--accent); font-weight: 500; }
    .toc-panel a.toc-h3 { padding-left: 22px; font-size: .74rem; }
    @media (max-width: 1200px) { .toc-panel { display: none; } }

    /* ── Mobile ─────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0;
        transform: translateX(-100%); width: var(--sidebar-w);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar.collapsed { transform: translateX(-100%); width: var(--sidebar-w); }
      .content-inner { padding: 24px 20px 60px; }
      .home-title { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme-dark" />

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-head">
      <a class="brand" href="#" onclick="navigate('home');return false;">
        <div class="brand-icon">D</div>
        <div>
          <div class="brand-name">DevTrack</div>
          <div class="brand-sub">Developer Automation</div>
        </div>
      </a>
      <div class="sidebar-search" style="margin-top:12px;">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/></svg>
        <input type="text" id="searchInput" placeholder="Search docs…" autocomplete="off" />
      </div>
      <div id="searchResults" class="search-results" style="display:none;"></div>
    </div>

    <nav class="nav" id="nav">
      <!-- Populated by JS -->
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <div class="topbar">
      <button class="topbar-toggle" id="sidebarToggle" title="Toggle sidebar">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
      </button>
      <div class="breadcrumb" id="breadcrumb">
        <span>DevTrack</span>
        <span class="sep">/</span>
        <span class="current" id="breadcrumbCurrent">Home</span>
      </div>
      <div class="topbar-actions">
        <span class="version-chip">v1.0</span>
        <button class="icon-btn" id="themeToggle" title="Toggle theme">
          <svg id="themeIcon" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
        </button>
      </div>
    </div>

    <!-- Content -->
    <div class="content-wrap" id="contentWrap">
      <div class="content-inner" id="content">
        <div class="state-msg"><div class="spinner"></div><span>Loading…</span></div>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
// ── Navigation Config ─────────────────────────────────────────────────────────
const NAV = [
  {
    group: 'Get Started',
    items: [
      { id: 'home',            label: 'Home',               icon: home_icon() },
      { id: 'GETTING_STARTED', label: 'Getting Started',    icon: rocket_icon() },
      { id: 'INSTALLATION',    label: 'Installation',       icon: download_icon() },
      { id: 'QUICK_START',     label: 'Quick Start',        icon: flash_icon() },
    ]
  },
  {
    group: 'Reference',
    items: [
      { id: 'CLI_REFERENCE',   label: 'CLI Reference',      icon: terminal_icon() },
      { id: 'CONFIGURATION',   label: 'Configuration',      icon: settings_icon() },
      { id: 'ARCHITECTURE',    label: 'Architecture',       icon: arch_icon() },
    ]
  },
  {
    group: 'Git & Shell Integration',
    items: [
      { id: 'GIT_FEATURES',       label: 'Git Features',      icon: git_icon() },
      { id: 'GIT_COMMIT_WORKFLOW', label: 'Commit Workflow',   icon: commit_icon() },
      { id: 'GIT_SAGE',            label: 'git-sage Agent',    icon: agent_icon() },
    ]
  },
  {
    group: 'Integrations',
    items: [
      { id: 'AZURE_DEVOPS',  label: 'Azure DevOps',    icon: azure_icon() },

// ── State ─────────────────────────────────────────────────────────────────────
let currentPage = 'home';
let theme = localStorage.getItem('dt-theme') || 'light';
let sidebarOpen = true;
// Auto-detect environment: local dev uses relative path, deployed uses GitHub raw
const GITHUB_RAW = 'https://raw.githubusercontent.com/sraj0501/automation_tools/main/docs/';
const DOCS_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:')
  ? '../docs/'
  : GITHUB_RAW;

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  setTheme(theme);
  buildNav();
  setupListeners();

  // Load from hash or default to home
  const hash = location.hash.slice(1);
  navigate(hash || 'home');
});

// ── Theme ─────────────────────────────────────────────────────────────────────
function setTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('dt-theme', t);
  const icon = document.getElementById('themeIcon');
  if (t === 'dark') {
    icon.innerHTML = '<path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/>';
  } else {
    icon.innerHTML = '<path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>';
  }
}

// ── Build Navigation ──────────────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = NAV.map(group => `
    <div class="nav-group">
      <div class="nav-group-label">${group.group}</div>
      ${group.items.map(item => `
        <a class="nav-item" data-id="${item.id}" href="#${item.id}" onclick="navigate('${item.id}');return false;">
          ${item.icon}
          ${item.label}
        </a>
      `).join('')}
    </div>
  `).join('');
}

// ── Setup Listeners ───────────────────────────────────────────────────────────
function setupListeners() {
  document.getElementById('themeToggle').onclick = () => setTheme(theme === 'light' ? 'dark' : 'light');
  document.getElementById('sidebarToggle').onclick = toggleSidebar;
  document.getElementById('searchInput').addEventListener('input', handleSearch);
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Escape') { clearSearch(); }
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('.sidebar-search')) clearSearch();
  });
  window.addEventListener('hashchange', () => {
    const hash = location.hash.slice(1);
    if (hash && hash !== currentPage) navigate(hash, false);
  });
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
  });
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sb = document.getElementById('sidebar');
  if (window.innerWidth <= 768) {
    sb.classList.toggle('open', sidebarOpen);
    sb.classList.remove('collapsed');
  } else {
    sb.classList.toggle('collapsed', !sidebarOpen);
  }
}

// ── Navigate ──────────────────────────────────────────────────────────────────
function navigate(id, pushHistory = true) {
  currentPage = id;
  if (pushHistory) history.replaceState(null, '', '#' + id);

  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  // Update breadcrumb
  const label = getLabel(id);
  document.getElementById('breadcrumbCurrent').textContent = label;

  // Close mobile sidebar
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }

  if (id === 'home') {
    renderHome();
  } else {
    loadMarkdown(id);
  }

  document.getElementById('contentWrap').scrollTop = 0;
}

function getLabel(id) {
  for (const group of NAV) {
    for (const item of group.items) {
      if (item.id === id) return item.label;
    }
  }
  return id;
}

// ── Load & Render Markdown ────────────────────────────────────────────────────
async function loadMarkdown(id) {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="state-msg"><div class="spinner"></div><span>Loading…</span></div>';

  const url = DOCS_BASE + id + '.md';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const md = await res.text();
    renderMarkdown(md, content);
  } catch (err) {
    content.innerHTML = `
      <div class="state-msg">
        <svg width="40" height="40" viewBox="0 0 20 20" fill="currentColor" style="opacity:.3"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
        <strong>Could not load ${id}.md</strong>
        <span style="font-size:.8rem;max-width:320px;">
          This wiki needs to be served over HTTP, not opened as a local file.<br>
          Run: <code style="font-family:monospace;background:var(--code-bg);padding:1px 5px;border-radius:4px;">python3 -m http.server 8080</code> from the project root, then visit <code style="font-family:monospace;background:var(--code-bg);padding:1px 5px;border-radius:4px;">localhost:8080/wiki/</code>
        </span>
      </div>`;
  }
}

function renderMarkdown(md, container) {
  // Configure marked
  marked.setOptions({ breaks: true, gfm: true });

  const renderer = new marked.Renderer();

  // Wrap tables
  renderer.table = (header, body) =>
    `<div class="table-wrap"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;

  // Open external links in new tab, rewrite internal .md links
  renderer.link = (href, title, text) => {
    if (href && href.endsWith('.md')) {
      const id = href.replace(/.*\//, '').replace('.md', '');
      return `<a href="#${id}" onclick="navigate('${id}');return false;"${title ? ` title="${title}"` : ''}>${text}</a>`;
    }
    const ext = href && !href.startsWith('#') && !href.startsWith('./') && !href.startsWith('../');
    return `<a href="${href}"${title ? ` title="${title}"` : ''}${ext ? ' target="_blank" rel="noopener"' : ''}>${text}</a>`;
  };

  marked.use({ renderer });

  const html = marked.parse(md);
  container.innerHTML = `<div class="md-body">${html}</div>`;

  addCodeToolbars(container);
  hljs.highlightAll();
  buildTOC(container);
}

// ── Code Toolbars & Copy Buttons ──────────────────────────────────────────────
function addCodeToolbars(container) {
  container.querySelectorAll('pre').forEach(pre => {
    const code = pre.querySelector('code');
    if (!code) return;
    const lang = (code.className.match(/language-(\w+)/) || [])[1] || '';
    const toolbar = document.createElement('div');
    toolbar.className = 'code-toolbar';
    toolbar.innerHTML = `
      <span class="code-lang">${lang}</span>
      <button class="copy-btn" onclick="copyCode(this)">Copy</button>
    `;
    pre.insertBefore(toolbar, code);
  });
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code');
  navigator.clipboard.writeText(code.innerText).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Table of Contents ─────────────────────────────────────────────────────────
function buildTOC(container) {
  const headings = container.querySelectorAll('h2, h3');
  if (headings.length < 3) return;

  const existing = document.querySelector('.toc-panel');
  if (existing) existing.remove();

  const toc = document.createElement('div');
  toc.className = 'toc-panel';
  toc.innerHTML = '<h6>On this page</h6>';

  headings.forEach((h, i) => {
    const id = 'heading-' + i;
    h.id = id;
    const a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = h.textContent;
    a.className = h.tagName === 'H3' ? 'toc-h3' : '';
    a.onclick = (e) => {
      e.preventDefault();
      h.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    toc.appendChild(a);
  });

  document.querySelector('.main').appendChild(toc);

  // Highlight active TOC item on scroll
  const wrap = document.getElementById('contentWrap');
  wrap.addEventListener('scroll', () => {
    const links = toc.querySelectorAll('a');
    let active = null;
    headings.forEach((h, i) => {
      if (h.getBoundingClientRect().top < 100) active = i;
    });
    links.forEach((a, i) => a.classList.toggle('active', i === active));
  }, { passive: true });
}

// ── Search ────────────────────────────────────────────────────────────────────
let allItems = [];
NAV.forEach(g => g.items.forEach(item => allItems.push({ ...item, group: g.group })));

function handleSearch(e) {
  const q = e.target.value.trim().toLowerCase();
  const container = document.getElementById('searchResults');
  if (!q) { container.style.display = 'none'; return; }

  const results = allItems.filter(item =>
    item.label.toLowerCase().includes(q) ||
    item.group.toLowerCase().includes(q) ||
    item.id.toLowerCase().includes(q)
  );

  if (results.length === 0) {
    container.style.display = 'block';
    container.innerHTML = '<div class="search-no-results">No results found</div>';
    return;
  }

  container.style.display = 'block';
  container.innerHTML = results.slice(0, 8).map(item => `
    <div class="search-result-item" onclick="navigate('${item.id}'); clearSearch();">
      <div class="search-result-title">${item.label}</div>
      <div class="search-result-section">${item.group}</div>
    </div>
  `).join('');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchResults').style.display = 'none';
}
</script>
