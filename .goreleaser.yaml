version: 2

project_name: devtrack

before:
  hooks:
    - bash -c "cd devtrack-bin && go mod tidy"

builds:
  - id: devtrack
    main: .
    dir: devtrack-bin
    binary: devtrack
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Skip unsupported combinations
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.GitCommit={{.ShortCommit}}
      - -X main.BuildTime={{.Date}}

archives:
  - id: devtrack
    builds:
      - devtrack
    name_template: "devtrack_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - .env_sample
      - docs/INSTALLATION.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  groups:
    - title: "New Features"
      regexp: "^feat"
      order: 0
    - title: "Bug Fixes"
      regexp: "^fix"
      order: 1
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
      - typo
      - Merge pull request
      - Merge branch

release:
  github:
    owner: sraj0501
    name: automation_tools
  name_template: "DevTrack {{.Version}}"
  header: |
    ## DevTrack {{.Version}}

    Pre-built binaries for macOS (Apple Silicon + Intel), Linux (amd64 + arm64), and Windows (amd64).

    > **DevTrack is a client-server tool.**
    > The `devtrack` binary is the client/daemon. The Python backend runs separately.

    ### Quick install

    ```bash
    # macOS / Linux
    curl -L https://github.com/sraj0501/automation_tools/releases/latest/download/devtrack_$(uname -s)_$(uname -m).tar.gz | tar xz
    sudo mv devtrack /usr/local/bin/

    # Set up the Python backend server (choose one):
    #   Local managed:  set DEVTRACK_SERVER_MODE=managed in .env  (default)
    #   Docker:         docker compose up
    devtrack install   # prints setup instructions
    ```

    See [Installation Guide](https://github.com/sraj0501/automation_tools/blob/main/docs/INSTALLATION.md) for full setup.
  footer: |
    **Full Changelog**: https://github.com/sraj0501/automation_tools/compare/{{.PreviousTag}}...{{.Tag}}
