name: CI

on:
  push:
    branches: [main, bot_automation]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: devtrack-bin/go.mod
          cache-dependency-path: devtrack-bin/go.sum

      - name: go vet
        run: cd devtrack-bin && go vet ./...

      - name: go test
        run: cd devtrack-bin && go test ./...

      - name: go build (smoke test)
        run: |
          # Bundle placeholder so go:embed compiles even without real assets
          mkdir -p devtrack-bin/assets
          touch devtrack-bin/assets/.gitkeep
          cd devtrack-bin && go build -o /dev/null .

  python-test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest backend/tests/ -q --tb=short
