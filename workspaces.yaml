version: "1"

workspaces:
  # Work projects tracked in Azure DevOps
  - name: "social_media_monolithic"
    path: "/Users/sraj/git_apps/personal/social_media_app/social_media_monilithic"
    pm_platform: "azure"
    pm_project: "my_Azure_Devops_project"
    enabled: true
    ignore_branches: ["dependabot/*", "renovate/*"]
    tags: ["work", "backend"]

  # Personal projects tracked in GitHub
  - name: "automation_tools"
    path: "/Users/sraj/git_apps/personal/automation_tools"
    pm_platform: "github"
    pm_project: "projects/1"
    enabled: true
    ignore_branches: []
    tags: ["personal"]

  # Repo you want monitored but NOT synced to any PM tool
  - name: "social_media_microservices"
    path: "/Users/sraj/git_apps/personal/social_media_app/social_media_microserv"
    pm_platform: "none"
    pm_project: ""
    enabled: true
    ignore_branches: []
    tags: ["personal"]
